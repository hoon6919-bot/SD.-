<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      width: 320px;
      background: #1a1a1a;
      border-radius: 24px;
      padding: 24px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 32px 64px rgba(0,0,0,0.6);
    }

    /* Display */
    .display {
      background: transparent;
      padding: 12px 4px 20px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 20px;
    }

    .display .expression {
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      min-height: 18px;
      letter-spacing: 0.5px;
    }

    .display .result {
      color: #ffffff;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: -1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Button Grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 62px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.08s ease;
      outline: none;
      position: relative;
    }

    button:active {
      transform: scale(0.93);
    }

    /* Number buttons */
    .btn-num {
      background: #2a2a2a;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .btn-num:hover {
      filter: brightness(1.3);
    }

    /* Zero — spans 2 columns */
    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 24px;
    }

    /* Function buttons (AC, +/-, %) */
    .btn-fn {
      background: #3a3a3a;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .btn-fn:hover {
      filter: brightness(1.3);
    }

    /* Operator buttons */
    .btn-op {
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 14px rgba(108,99,255,0.35);
    }

    .btn-op:hover {
      filter: brightness(1.15);
    }

    /* Equals button */
    .btn-eq {
      background: linear-gradient(135deg, #a78bfa, #6c63ff);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 18px rgba(167,139,250,0.4);
      font-size: 22px;
    }

    .btn-eq:hover {
      filter: brightness(1.12);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-fn" onclick="clearAll()">AC</button>
      <button class="btn-fn" onclick="toggleSign()">+/−</button>
      <button class="btn-fn" onclick="percent()">%</button>
      <button class="btn-op" onclick="setOperator('÷')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="input('7')">7</button>
      <button class="btn-num" onclick="input('8')">8</button>
      <button class="btn-num" onclick="input('9')">9</button>
      <button class="btn-op" onclick="setOperator('×')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="input('4')">4</button>
      <button class="btn-num" onclick="input('5')">5</button>
      <button class="btn-num" onclick="input('6')">6</button>
      <button class="btn-op" onclick="setOperator('−')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="input('1')">1</button>
      <button class="btn-num" onclick="input('2')">2</button>
      <button class="btn-num" onclick="input('3')">3</button>
      <button class="btn-op" onclick="setOperator('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num btn-zero" onclick="input('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = '';
    let operator = null;
    let shouldReset = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current;
      const fontSize = current.length > 9 ? '28px' : current.length > 6 ? '36px' : '42px';
      resultEl.style.fontSize = fontSize;
    }

    function input(val) {
      if (shouldReset) {
        current = val;
        shouldReset = false;
      } else {
        current = current === '0' ? val : current + val;
        if (current.length > 12) return;
      }
      updateDisplay();
    }

    function inputDot() {
      if (shouldReset) { current = '0.'; shouldReset = false; updateDisplay(); return; }
      if (!current.includes('.')) {
        current += '.';
        updateDisplay();
      }
    }

    function setOperator(op) {
      if (operator && !shouldReset) calculate(true);
      previous = current;
      operator = op;
      shouldReset = true;
      expressionEl.textContent = `${previous} ${operator}`;
    }

    function calculate(chain = false) {
      if (!operator || !previous) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let res;
      if (operator === '+') res = a + b;
      else if (operator === '−') res = a - b;
      else if (operator === '×') res = a * b;
      else if (operator === '÷') res = b !== 0 ? a / b : 'Error';

      if (!chain) {
        expressionEl.textContent = `${previous} ${operator} ${current} =`;
        operator = null;
        previous = '';
      }

      current = res === 'Error' ? 'Error' : parseFloat(res.toFixed(10)).toString();
      shouldReset = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = null;
      shouldReset = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (current === '0' || current === 'Error') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay();
    }

    function percent() {
      current = (parseFloat(current) / 100).toString();
      updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('−');
      else if (e.key === '*') setOperator('×');
      else if (e.key === '/') { e.preventDefault(); setOperator('÷'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
